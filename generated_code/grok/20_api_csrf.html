backend structure).
HTML + Frontend (update-email.html) -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Email</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 420px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: #374151;
        }

        input[type="email"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .message {
            margin-top: 1.2rem;
            padding: 0.9rem;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .info {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
    </style>
</head>

<body>

    <h1>Update Email Address</h1>

    <form id="updateEmailForm">
        <div class="form-group">
            <label for="newEmail">New email address</label>
            <input type="email" id="newEmail" name="newEmail" placeholder="you@example.com" required
                autocomplete="email" />
        </div>

        <button type="submit" id="submitBtn">Update Email</button>
    </form>

    <div id="message" class="message" style="display: none;"></div>

    <script>
        const form = document.getElementById('updateEmailForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            messageDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const response = await fetch('/api/user/update-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        newEmail: form.newEmail.value.trim()
                    }),
                    credentials: 'include'   // ← sends cookies (session/jwt)
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('success', data.message || 'Email updated successfully!');
                    form.reset();
                } else {
                    showMessage('error', data.error || 'Failed to update email.');
                }
            } catch (err) {
                showMessage('error', 'Network error. Please try again.');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Email';
            }
        });

        function showMessage(type, text) {
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
        }
    </script>

</body>

</html>
