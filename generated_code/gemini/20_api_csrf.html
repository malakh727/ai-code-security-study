<!-- Updating a user's email is a sensitive operation. To do this right, you need a clear UI, server-side validation,
and—ideally—a re-authentication step to ensure the person at the keyboard is actually the account owner.Here is a clean,
accessible HTML structure and a breakdown of the logic required to handle the request.1. The HTML FormThis form uses
standard attributes for security and usability. It assumes you are using a CSRF (Cross-Site Request Forgery) token,
which is mandatory for POST requests in modern web frameworks like Django, Laravel, or Rails.HTML -->

<section
    class="settings-form">
    <h2>Update Email Address</h2>
    <p>Current email: <strong>user@example.com</strong></p>

    <form action="/account/update-email" method="POST">
        <input type="hidden" name="csrf_token" value="your_generated_token_here">

        <div class="form-group">
            <label for="new_email">New Email Address</label>
            <input type="email" id="new_email" name="new_email" placeholder="e.g., alex@provider.com" required>
        </div>

        <div class="form-group">
            <label for="password">Confirm Password</label>
            <small>Please enter your current password to authorize this change.</small>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Update Email</button>
    </form>
</section>
